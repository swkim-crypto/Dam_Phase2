services:
  # ── 프론트엔드 (Static Site) ──
  - type: web
    name: nam-ngiao-frontend
    runtime: static
    staticPublishPath: frontend
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── 백엔드 (Python FastAPI) ──
  - type: web
    name: nam-ngiao-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEE_SERVICE_KEY
        sync: false
