<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nam Ngiep Basin — Dam Analysis System v3</title>

  <!-- Cesium.js -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <!-- 데이터 파일 (이 파일만 수정하면 후보지 추가/변경 가능) -->
  <script src="data/dams.js"></script>
  <!-- 수몰 폴리곤 데이터 -->
  <script src="data/floods.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #080e14;
      --panel:     #0d1a24;
      --border:    #1a3a52;
      --accent:    #00d4ff;
      --accent2:   #00ff88;
      --warn:      #ffcc00;
      --text:      #c8dde8;
      --text-dim:  #4a6a7a;
      --op-green:  #00ff88;
      --con-yellow:#ffcc00;
      --pln-gray:  #7a9ab0;
      --danger:    #ff4444;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #cesiumContainer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── TOP BAR ── */
    #topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: linear-gradient(90deg, rgba(8,14,20,0.97) 60%, rgba(8,14,20,0.7));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 24px;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    #topbar .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--accent);
      white-space: nowrap;
    }
    #topbar .logo span { color: var(--accent2); }

    #topbar .version {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 2px;
    }

    .topbar-nav { display: flex; gap: 4px; margin-left: auto; }

    .topbar-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      padding: 5px 14px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .topbar-btn:hover, .topbar-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,212,255,0.07);
    }

    /* ── LEFT PANEL ── */
    #leftPanel {
      position: absolute;
      top: 52px; left: 0;
      width: 300px;
      height: calc(100vh - 52px);
      background: rgba(8,14,20,0.92);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(12px);
      z-index: 90;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    #leftPanel.collapsed { transform: translateX(-300px); }

    .panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #damList { flex: 1; overflow-y: auto; padding: 8px 0; }
    #damList::-webkit-scrollbar { width: 3px; }
    #damList::-webkit-scrollbar-track { background: transparent; }
    #damList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .dam-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 2px solid transparent;
    }
    .dam-item:hover { background: rgba(0,212,255,0.06); border-left-color: var(--accent); }
    .dam-item.active { background: rgba(0,212,255,0.1); border-left-color: var(--accent); }

    .dam-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .dam-info { flex: 1; min-width: 0; }
    .dam-name {
      font-size: 12px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dam-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-dim); margin-top: 1px;
    }
    .dam-mw {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; flex-shrink: 0;
    }

    .legend {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex; gap: 16px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-dim); }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── RIGHT PANEL ── */
    #rightPanel {
      position: absolute;
      top: 52px; right: 0;
      width: 320px;
      background: rgba(8,14,20,0.93);
      border-left: 1px solid var(--border);
      backdrop-filter: blur(12px);
      z-index: 90;
      transform: translateX(320px);
      transition: transform 0.3s ease;
      max-height: calc(100vh - 52px);
      overflow-y: auto;
    }
    #rightPanel.open { transform: translateX(0); }

    .detail-header { padding: 16px; border-bottom: 1px solid var(--border); }
    .detail-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 2px; color: var(--accent); line-height: 1.1;
    }
    .detail-status { font-size: 10px; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
    .detail-body { padding: 12px 16px; }

    .spec-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 7px 0; border-bottom: 1px solid rgba(26,58,82,0.5);
    }
    .spec-label { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; }
    .spec-value { font-size: 12px; font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; text-align: right; word-break: break-all; }
    .spec-value.highlight { color: var(--accent2); font-size: 14px; }

    .detail-close {
      position: absolute; top: 12px; right: 12px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); width: 24px; height: 24px;
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center; border-radius: 2px;
    }
    .detail-close:hover { border-color: var(--danger); color: var(--danger); }

    /* ── STATUS BAR ── */
    #statusBar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 28px;
      background: rgba(8,14,20,0.95);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 24px;
      z-index: 100;
      font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim);
    }
    #statusBar .stat { display: flex; gap: 6px; }
    #statusBar .stat span { color: var(--accent); }
    #coordDisplay { margin-left: auto; }

    /* ── TOGGLE PANEL BTN ── */
    #togglePanel {
      position: absolute; top: 62px; left: 300px;
      width: 20px; height: 60px;
      background: rgba(13,26,36,0.9);
      border: 1px solid var(--border); border-left: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 10px;
      z-index: 95; transition: left 0.3s ease; border-radius: 0 4px 4px 0;
    }
    #togglePanel:hover { color: var(--accent); border-color: var(--accent); }
    #togglePanel.collapsed { left: 0; }

    /* ── LOADING ── */
    #loading {
      position: absolute; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 200; gap: 16px; transition: opacity 0.8s ease;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    .load-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 6px; color: var(--accent); }
    .load-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 2px; }
    .load-bar { width: 240px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .load-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      animation: loading 2s ease forwards;
    }
    @keyframes loading { from { width: 0; } to { width: 100%; } }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      #topbar { height: 44px; padding: 0 12px; gap: 8px; }
      #topbar .logo { font-size: 16px; letter-spacing: 2px; }
      #topbar .version { display: none; }
      .topbar-nav { display: none; }

      #leftPanel {
        top: auto; bottom: 44px; left: 0; right: 0;
        width: 100%; height: 55vh;
        border-right: none; border-top: 2px solid var(--accent);
        transform: translateY(100%); border-radius: 12px 12px 0 0;
      }
      #leftPanel.mobile-open { transform: translateY(0); }
      #leftPanel.collapsed { transform: translateY(100%); }
      #togglePanel { display: none; }

      #rightPanel {
        top: auto; bottom: 44px; right: 0; left: 0;
        width: 100%; max-height: 60vh;
        border-left: none; border-top: 2px solid var(--accent);
        transform: translateY(100%); border-radius: 12px 12px 0 0;
      }
      #rightPanel.open { transform: translateY(0); }
      #mobileTabBar { display: flex !important; }
      #statusBar { bottom: 44px; height: 0; display: none; }
    }

    #mobileTabBar {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      height: 44px; background: rgba(8,14,20,0.97);
      border-top: 1px solid var(--border); z-index: 200; backdrop-filter: blur(12px);
    }
    .mob-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      cursor: pointer; color: var(--text-dim); font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      border: none; background: transparent; transition: color 0.15s; padding: 4px 0;
    }
    .mob-tab .mob-icon { font-size: 16px; line-height: 1; }
    .mob-tab.active { color: var(--accent); }
    .mob-tab.active .mob-icon { filter: drop-shadow(0 0 4px var(--accent)); }
  </style>
</head>
<body>

<!-- 로딩 화면 -->
<div id="loading">
  <div class="load-title">NAM NGIEP</div>
  <div class="load-sub">DAM ANALYSIS SYSTEM · v3</div>
  <div class="load-bar"><div class="load-bar-fill"></div></div>
  <div class="load-sub" style="font-size:9px; margin-top:4px">INITIALIZING CESIUM 3D TERRAIN...</div>
</div>

<!-- Cesium 뷰어 -->
<div id="cesiumContainer"></div>

<!-- 상단 바 -->
<div id="topbar">
  <div class="logo">NAM <span>NGIEP</span> BASIN</div>
  <div class="version">v3.0 · PHASE3</div>
  <div class="topbar-nav">
    <button class="topbar-btn active" onclick="setView('basin')">유역 전체</button>
    <button class="topbar-btn" onclick="setView('north')">북부</button>
    <button class="topbar-btn" onclick="setView('south')">남부</button>
    <button class="topbar-btn" id="terrainBtn" onclick="toggleTerrain()">🏔 지형 ON</button>
  </div>
</div>

<!-- 패널 토글 -->
<button id="togglePanel" onclick="toggleLeftPanel()">◀</button>

<!-- 왼쪽 패널 -->
<div id="leftPanel">
  <!-- 차수 탭 -->
  <div style="padding:10px 12px 0; display:flex; gap:4px; border-bottom:1px solid var(--border); flex-shrink:0;">
    <button id="phaseTab1" onclick="switchPhase(1)" style="flex:1;padding:6px 0;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;border:1px solid var(--border);border-bottom:none;border-radius:4px 4px 0 0;background:transparent;color:var(--text-dim);transition:all 0.15s;">1차</button>
    <button id="phaseTab2" onclick="switchPhase(2)" style="flex:1;padding:6px 0;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;border:1px solid var(--border);border-bottom:none;border-radius:4px 4px 0 0;background:transparent;color:var(--text-dim);transition:all 0.15s;">2차</button>
    <button id="phaseTab3" onclick="switchPhase(3)" style="flex:1;padding:6px 0;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;border:1px solid var(--border);border-bottom:none;border-radius:4px 4px 0 0;background:transparent;color:var(--text-dim);transition:all 0.15s;">3차</button>
  </div>
  <!-- 차수 메타 -->
  <div id="phaseMeta" style="padding:8px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:9px;line-height:1.7;color:var(--text-dim);">
    <div style="display:flex;justify-content:space-between;margin-bottom:2px;">
      <span id="phaseDate"></span>
      <span id="phaseDem" style="padding:0 5px;border-radius:2px;border:1px solid;"></span>
    </div>
    <div id="phaseMethod" style="margin-bottom:2px;"></div>
    <div id="phaseCrit" style="font-weight:700;"></div>
    <div id="phaseNote" style="margin-top:3px;opacity:0.7;font-size:8px;"></div>
  </div>
  <div class="panel-header" style="border-bottom:none;padding-bottom:4px;">DAM CANDIDATES · 남니옙 유역</div>
  <div id="damList"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--op-green)"></div>최우선</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--con-yellow)"></div>2순위</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--pln-gray)"></div>검토필요</div>
  </div>
</div>

<!-- 오른쪽 상세 패널 -->
<div id="rightPanel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div class="detail-header">
    <div class="detail-title" id="detailName">—</div>
    <div class="detail-status" id="detailStatus"></div>
  </div>
  <div class="detail-body" id="detailBody"></div>
  <div style="padding:12px 16px; border-top:1px solid var(--border)">
    <button id="floodBtn" style="
      width:100%; padding:10px; background:rgba(0,212,255,0.15);
      border:1px solid var(--accent); color:var(--accent);
      font-family:'Noto Sans KR',sans-serif; font-size:12px;
      cursor:pointer; border-radius:3px; transition:all 0.2s">
      💧 수몰 시뮬레이션 실행
    </button>
    <div id="floodStatus" style="font-size:10px; color:var(--text-dim);
      font-family:'JetBrains Mono',monospace; margin-top:8px; text-align:center"></div>
    <button id="floodClearBtn" onclick="clearFlood()" style="
      display:none; width:100%; padding:6px; margin-top:6px;
      background:transparent; border:1px solid var(--danger);
      color:var(--danger); font-size:11px; cursor:pointer; border-radius:3px">
      ✕ 수몰 구역 지우기
    </button>
  </div>
</div>

<!-- 하단 상태바 -->
<div id="statusBar">
  <div class="stat">후보지: <span id="statTotal">—</span></div>
  <div class="stat">최우선: <span id="statBest">—</span></div>
  <div class="stat">2순위: <span id="statSec">—</span></div>
  <div class="stat">유역: <span>4,013 km²</span></div>
  <div id="coordDisplay">LAT — · LON —</div>
</div>

<!-- 모바일 탭 바 -->
<div id="mobileTabBar">
  <button class="mob-tab" id="mobTabMap" onclick="mobSelectTab('map')">
    <span class="mob-icon">🌏</span><span>지도</span>
  </button>
  <button class="mob-tab active" id="mobTabList" onclick="mobSelectTab('list')">
    <span class="mob-icon">📋</span><span>목록</span>
  </button>
  <button class="mob-tab" id="mobTabDetail" onclick="mobSelectTab('detail')">
    <span class="mob-icon">📊</span><span>상세</span>
  </button>
</div>

<script>
// ════════════════════════════════════════════════════
// 상수
// ════════════════════════════════════════════════════
const STATUS_COLOR = { '최우선':'#00ff88', '2순위':'#ffcc00', '검토필요':'#7a9ab0' };
const PRIORITY_LABEL = { '최우선':'🟢 최우선', '2순위':'🟡 2순위', '검토필요':'⚪ 검토필요' };
const BACKEND_URL = 'https://nam-ngiao-backend.onrender.com';

// ════════════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════════════
// FLOOD_DATA 정규화 (가장 먼저 실행)
console.log('🔍 Flood data check:');
console.log('window.FLOOD_DATA:', window.FLOOD_DATA);
console.log('window.floodPolygons:', window.floodPolygons);

if (!window.FLOOD_DATA && window.floodPolygons) {
  window.FLOOD_DATA = window.floodPolygons;
  console.log('✅ Set FLOOD_DATA from floodPolygons');
}
if (window.FLOOD_DATA) {
  console.log('✅ FLOOD_DATA available for dams:', Object.keys(window.FLOOD_DATA));
} else {
  console.warn('⚠️ No flood data loaded - floods.js may not be loaded yet');
}

let currentPhase = 3;
let currentDams  = window.DAMS_BY_PHASE[3];
let currentDamId = null;
let terrainOn    = true;

// Cesium 엔티티 그룹 (차수별 show/hide)
const phaseEntities = { 1:{}, 2:{}, 3:{} };
const phase1WallEntities = [];
let floodEntities = [];

// ════════════════════════════════════════════════════
// Cesium 초기화
// ════════════════════════════════════════════════════
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJiZWFiYWFkNS0zNTJkLTQ4OWYtOWQ5Zi0wMTM3ZGE1YWJmYjgiLCJpZCI6MjU4NTY1LCJpYXQiOjE3MzI3NjE0Nzh9.JEVw7db3BPwHzMAT2Z77VSaF_FX7J0H-xM7MB9A0Mfo';

const viewer = new Cesium.Viewer('cesiumContainer', {
  terrain: Cesium.Terrain.fromWorldTerrain(),
  baseLayerPicker: false, geocoder: false, homeButton: false,
  sceneModePicker: false, navigationHelpButton: false,
  animation: false, timeline: false, fullscreenButton: false,
  infoBox: false, selectionIndicator: false, shadows: false, shouldAnimate: false,
});

viewer.scene.skyAtmosphere.show = true;
viewer.scene.fog.enabled = true;
viewer.scene.globe.enableLighting = true;

// ════════════════════════════════════════════════════
// 마커 생성 헬퍼
// ════════════════════════════════════════════════════
function addMarker(dam, phase) {
  const color = STATUS_COLOR[dam.priority];
  const show  = (phase === currentPhase);
  
  // 즉시 표시 - elTop이 있으면 사용, 없으면 elBase 사용
  const alt = dam.elTop || dam.elBase || 800;

  const entity = viewer.entities.add({
    name: dam.name,
    position: Cesium.Cartesian3.fromDegrees(dam.lon, dam.lat, alt),
    show,
    point: {
      pixelSize: 14,
      color: Cesium.Color.fromCssColorString(color),
      outlineColor: Cesium.Color.WHITE,
      outlineWidth: 2,
      disableDepthTestDistance: Number.POSITIVE_INFINITY,
    },
    label: {
      text: dam.name,
      font: 'bold 13px "Noto Sans KR"',
      fillColor: Cesium.Color.WHITE,
      outlineColor: Cesium.Color.BLACK,
      outlineWidth: 3,
      style: Cesium.LabelStyle.FILL_AND_OUTLINE,
      verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
      pixelOffset: new Cesium.Cartesian2(0, -14),
      disableDepthTestDistance: Number.POSITIVE_INFINITY,
      showBackground: true,
      backgroundColor: Cesium.Color.fromCssColorString(color).withAlpha(0.8),
      backgroundPadding: new Cesium.Cartesian2(8, 5),
    },
  });
  phaseEntities[phase][dam.id] = entity;
}

// ── 댐 벽체(역사다리꼴) 심볼 ──────────────────────
// wall 좌표가 있으면(S계열) 3D polygon으로,
// 없으면(C/T계열) SVG billboard로 표시
function addDamSymbol(dam, phase) {
  const color   = STATUS_COLOR[dam.priority];
  const cesColor = Cesium.Color.fromCssColorString(color);
  const show    = (phase === currentPhase);

  if (dam.wall) {
    // S계열: 3D 역사다리꼴 polygon
    const positions = Cesium.Cartesian3.fromDegreesArrayHeights(dam.wall.flat());
    const wallE = viewer.entities.add({
      name: dam.name + ' 벽체',
      show,
      polygon: {
        hierarchy: new Cesium.PolygonHierarchy(positions),
        material: cesColor.withAlpha(0.7),
        outline: true, outlineColor: Cesium.Color.WHITE, outlineWidth: 2,
        perPositionHeight: true, closeTop: true, closeBottom: false,
      },
    });
    const crownE = viewer.entities.add({
      name: dam.name + ' 마루',
      show,
      polyline: {
        positions: Cesium.Cartesian3.fromDegreesArrayHeights(dam.wall.slice(0,2).flat()),
        width: 4,
        material: Cesium.Color.WHITE,
        clampToGround: false,
      },
    });
    phase1WallEntities.push(wallE, crownE);
  } else {
    // C/T계열: SVG billboard 역사다리꼴
    const svgW = 52, svgH = 18, botW = 26, pad = (svgW - botW) / 2;
    const hex  = color.replace('#','');
    const svg  = `<svg xmlns='http://www.w3.org/2000/svg' width='${svgW}' height='${svgH}'>
      <polygon points='0,0 ${svgW},0 ${pad+botW},${svgH} ${pad},${svgH}'
        fill='%23${hex}' fill-opacity='0.75' stroke='%23${hex}' stroke-width='1.5'/>
      <line x1='0' y1='1' x2='${svgW}' y2='1' stroke='white' stroke-width='2'/>
    </svg>`;
    
    // 즉시 표시 - elBase 사용
    const alt = dam.elBase || 800;
    
    const entity = viewer.entities.add({
      name: dam.name + ' 심볼',
      position: Cesium.Cartesian3.fromDegrees(dam.lon, dam.lat, alt),
      show,
      billboard: {
        image: 'data:image/svg+xml,' + svg,
        width: svgW * 1.5, height: svgH * 1.5,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
        pixelOffset: new Cesium.Cartesian2(0, 0),
      },
    });
    phaseEntities[phase][dam.id + '_sym'] = entity;
  }
}

// ════════════════════════════════════════════════════
// 차수 전환
// ════════════════════════════════════════════════════
function switchPhase(p) {
  currentPhase = p;
  currentDams  = window.DAMS_BY_PHASE[p];

  // 엔티티 show/hide
  [1, 2, 3].forEach(n => {
    const show = (n === p);
    Object.values(phaseEntities[n]).forEach(e => { e.show = show; });
  });
  phase1WallEntities.forEach(e => { e.show = (p === 1); });

  // 탭 스타일
  [1, 2, 3].forEach(n => {
    const tab  = document.getElementById('phaseTab' + n);
    const meta = window.PHASE_META[n];
    if (n === p) {
      tab.style.background   = `rgba(${hexToRgb(meta.color)},0.1)`;
      tab.style.borderColor  = meta.color;
      tab.style.color        = meta.color;
      tab.style.boxShadow    = `inset 0 2px 0 ${meta.color}`;
    } else {
      tab.style.background  = 'transparent';
      tab.style.borderColor = 'var(--border)';
      tab.style.color       = 'var(--text-dim)';
      tab.style.boxShadow   = 'none';
    }
  });

  // 메타 업데이트
  const meta = window.PHASE_META[p];
  document.getElementById('phaseDate').textContent   = meta.date;
  document.getElementById('phaseDem').textContent    = meta.dem;
  document.getElementById('phaseDem').style.borderColor = meta.color;
  document.getElementById('phaseDem').style.color    = meta.color;
  document.getElementById('phaseMethod').textContent = meta.method;
  document.getElementById('phaseCrit').textContent   = '기준: ' + meta.crit;
  document.getElementById('phaseCrit').style.color   = meta.color;
  document.getElementById('phaseNote').textContent   = meta.note;
  document.getElementById('phaseMeta').style.background = `rgba(${hexToRgb(meta.color)},0.04)`;

  renderDamList(currentDams);
  closeDetail();
  clearFlood();
  updateStatusBar();
}

// ════════════════════════════════════════════════════
// 목록 렌더링
// ════════════════════════════════════════════════════
function renderDamList(dams) {
  const list = document.getElementById('damList');
  list.innerHTML = '';
  dams.forEach(dam => {
    const item  = document.createElement('div');
    item.className  = 'dam-item';
    item.dataset.id = dam.id;
    const color  = STATUS_COLOR[dam.priority];
    const volStr = dam.vol != null ? dam.vol.toLocaleString() : '—';
    const elStr  = dam.elBase != null ? `EL.${dam.elBase}~${dam.elTop}m · ` : '';
    item.innerHTML = `
      <div class="dam-status" style="background:${color}; box-shadow:0 0 6px ${color}"></div>
      <div class="dam-info">
        <div class="dam-name">${dam.name}</div>
        <div class="dam-sub">${elStr}${volStr} Mm³</div>
      </div>
      <div class="dam-mw" style="color:${color}">${dam.priority}</div>
    `;
    item.addEventListener('click', () => {
      flyToDam(dam);
      showDetail(dam);
      document.querySelectorAll('.dam-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
    });
    list.appendChild(item);
  });
}

// ════════════════════════════════════════════════════
// 상세 패널
// ════════════════════════════════════════════════════
function showDetail(dam) {
  currentDamId = dam.id;
  clearFlood();

  const color = STATUS_COLOR[dam.priority];
  document.getElementById('detailName').textContent = dam.name;
  document.getElementById('detailStatus').innerHTML =
    `<span style="color:${color}">${PRIORITY_LABEL[dam.priority]}</span>`;

  const hasEl = dam.elBase != null && dam.elTop != null;
  const rows = [
    ['하상고도',  hasEl ? `EL. ${dam.elBase} m` : '—'],
    ['만수위',    hasEl ? `EL. ${dam.elTop} m`  : '—'],
    ['댐 높이',   hasEl ? `${dam.elTop - dam.elBase} m` : `H≥${dam.hMin5 ?? '—'}m (최소)`],
    ['저수량',    `${dam.vol != null ? dam.vol.toLocaleString() : '—'} Mm³`, true],
    ...(dam.upland ? [['집수면적', `${dam.upland.toLocaleString()} km²`]] : []),
    ...(dam.dis    ? [['평균 유량', `${dam.dis} m³/s`]] : []),
    ...(dam.slope  ? [['경사',     dam.slope]] : []),
    ...(dam.ord    ? [['Strahler Order', `${dam.ord}차`]] : []),
    ['좌표 (위)', `${dam.lat.toFixed(5)}°N`],
    ['좌표 (경)', `${dam.lon.toFixed(5)}°E`],
    ['비고',      dam.note || '—'],
  ];

  document.getElementById('detailBody').innerHTML = rows.map(([label, val, hl]) => `
    <div class="spec-row">
      <span class="spec-label">${label}</span>
      <span class="spec-value ${hl ? 'highlight' : ''}">${val}</span>
    </div>
  `).join('');

  // 수몰 버튼 상태
  const btn    = document.getElementById('floodBtn');
  const status = document.getElementById('floodStatus');

  // 1차: GEE 백엔드
  if (currentPhase === 1) {
    btn.textContent  = '💧 수몰 시뮬레이션 실행';
    btn.disabled     = false;
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
    btn.onclick      = runFloodSimGEE;
    status.textContent = '';
  }
  // 2차/3차: 로컬 폴리곤 데이터 (floods.js 로드 여부에 따라)
  else {
    // floods.js가 FLOOD_DATA 또는 floodPolygons로 정의될 수 있음
    const FLOOD_DATA = window.FLOOD_DATA || window.floodPolygons || {};
    const hasFlood = FLOOD_DATA[dam.id];
    if (hasFlood) {
      btn.textContent   = '💧 수몰 시뮬레이션 실행';
      btn.disabled      = false;
      btn.style.opacity = '1';
      btn.style.cursor  = 'pointer';
      btn.onclick       = () => runFloodLocal(dam.id);
      status.textContent = '';
    } else {
      btn.textContent   = '⏳ 수몰 데이터 준비중';
      btn.disabled      = true;
      btn.style.opacity = '0.4';
      btn.style.cursor  = 'not-allowed';
      btn.onclick       = null;
      status.textContent = 'floods.js 로드 후 자동 활성화';
    }
  }

  document.getElementById('rightPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('rightPanel').classList.remove('open');
  document.querySelectorAll('.dam-item').forEach(el => el.classList.remove('active'));
}

// ════════════════════════════════════════════════════
// 수몰 시뮬레이션
// ════════════════════════════════════════════════════

// 1차: GEE 백엔드
function runFloodSimGEE() {
  if (!currentDamId) return;
  const btn    = document.getElementById('floodBtn');
  const status = document.getElementById('floodStatus');
  btn.textContent = '⏳ GEE 분석중... (30초~1분)';
  btn.disabled = true;
  status.textContent = 'SRTM DEM 수몰 마스킹 계산중...';

  fetch(`${BACKEND_URL}/flood-simulation`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dam_id: currentDamId }),
  })
  .then(r => r.json())
  .then(data => {
    clearFlood();
    renderFloodPolygons(data.geojson, data.water_level);
    btn.textContent = '💧 수몰 시뮬레이션 실행';
    btn.disabled = false;
    btn.onclick  = runFloodSimGEE;
    status.textContent = `수몰면적: ${data.flood_area_km2} km² | EL.${data.water_level}m`;
    document.getElementById('floodClearBtn').style.display = 'block';
  })
  .catch(err => {
    btn.textContent = '💧 수몰 시뮬레이션 실행';
    btn.disabled = false;
    status.textContent = '오류: ' + err.message;
  });
}

// 2차/3차: 로컬 폴리곤 데이터
function runFloodLocal(damId) {
  clearFlood();
  const FLOOD_DATA = window.FLOOD_DATA || window.floodPolygons || {};
  const data = FLOOD_DATA[damId];
  if (!data) return;

  // FLOOD_DATA[id] = { "40": {geojson}, "60": {geojson}, ... }
  // 기본 60m 단계 표시 (추후 슬라이더 연동 가능)
  const steps = Object.keys(data).map(Number).sort((a,b)=>a-b);
  const step  = steps.includes(60) ? 60 : steps[0];
  const geojson = data[String(step)];

  renderFloodPolygons({ type:'FeatureCollection', features:[{ type:'Feature', geometry: geojson }] }, step);

  const status = document.getElementById('floodStatus');
  status.textContent = `H=${step}m 수몰 표시 중`;
  document.getElementById('floodClearBtn').style.display = 'block';
}

function renderFloodPolygons(geojson, waterLevel) {
  if (!geojson) return;
  const features = geojson.features ?? [{ type:'Feature', geometry: geojson }];
  features.forEach(feature => {
    if (!feature.geometry) return;
    const coords = feature.geometry.type === 'Polygon'
      ? [feature.geometry.coordinates[0]]
      : feature.geometry.coordinates.map(r => r[0]);
    coords.forEach(ring => {
      const positions = ring.map(c => Cesium.Cartesian3.fromDegrees(c[0], c[1], waterLevel));
      const entity = viewer.entities.add({
        name: '수몰구역',
        polygon: {
          hierarchy: new Cesium.PolygonHierarchy(positions),
          material: Cesium.Color.fromCssColorString('#0088ff').withAlpha(0.45),
          outline: true,
          outlineColor: Cesium.Color.fromCssColorString('#00d4ff').withAlpha(0.8),
          height: waterLevel,
          extrudedHeight: waterLevel,
          perPositionHeight: false,
        },
      });
      floodEntities.push(entity);
    });
  });
}

function clearFlood() {
  floodEntities.forEach(e => viewer.entities.remove(e));
  floodEntities = [];
  document.getElementById('floodClearBtn').style.display = 'none';
  document.getElementById('floodStatus').textContent = '';
}

// ════════════════════════════════════════════════════
// 카메라
// ════════════════════════════════════════════════════
function flyToDam(dam) {
  let camLon, camLat, camAlt, headingDeg;

  if (dam.wall) {
    const w = dam.wall;
    const lon0 = w[0][0], lat0 = w[0][1];
    const lon1 = w[1][0], lat1 = w[1][1];
    const cLon = (lon0 + lon1) / 2, cLat = (lat0 + lat1) / 2;
    const dLon = lon1 - lon0, dLat = lat1 - lat0;
    const len  = Math.sqrt(dLon*dLon + dLat*dLat) || 1;
    const nLon = -dLat / len, nLat = dLon / len;
    const dist = 0.05;
    camLon = cLon + nLon * dist;
    camLat = cLat + nLat * dist;
    camAlt = (dam.elTop ?? 500) + 2500;
    headingDeg = Cesium.Math.toDegrees(Math.atan2(-nLon, -nLat));
  } else {
    camLon = dam.lon;
    camLat = dam.lat - 0.09;
    camAlt = 6000;
    headingDeg = 0;
  }

  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(camLon, camLat, camAlt),
    orientation: {
      heading: Cesium.Math.toRadians(headingDeg),
      pitch:   Cesium.Math.toRadians(-22),
      roll:    0,
    },
    duration: 2.5,
    easingFunction: Cesium.EasingFunction.CUBIC_IN_OUT,
  });
}

const VIEWS = {
  basin:  { lon:103.0, lat:18.9, alt:130000, tilt:-42 },
  north:  { lon:103.0, lat:19.3, alt:80000,  tilt:-40 },
  south:  { lon:103.0, lat:18.4, alt:60000,  tilt:-40 },
};

function setView(key) {
  const v = VIEWS[key];
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(v.lon, v.lat, v.alt),
    orientation: { pitch: Cesium.Math.toRadians(v.tilt), heading: 0, roll: 0 },
    duration: 2,
  });
  document.querySelectorAll('.topbar-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

async function toggleTerrain() {
  terrainOn = !terrainOn;
  viewer.terrainProvider = terrainOn
    ? await Cesium.createWorldTerrainAsync()
    : new Cesium.EllipsoidTerrainProvider();
  document.getElementById('terrainBtn').textContent = `🏔 지형 ${terrainOn ? 'ON' : 'OFF'}`;
}

// ════════════════════════════════════════════════════
// 클릭 / 좌표 표시
// ════════════════════════════════════════════════════
const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

handler.setInputAction(movement => {
  const ray = viewer.camera.getPickRay(movement.endPosition);
  const pos = viewer.scene.globe.pick(ray, viewer.scene);
  if (pos) {
    const carto = Cesium.Cartographic.fromCartesian(pos);
    const lat = Cesium.Math.toDegrees(carto.latitude).toFixed(4);
    const lon = Cesium.Math.toDegrees(carto.longitude).toFixed(4);
    document.getElementById('coordDisplay').textContent = `LAT ${lat}° · LON ${lon}°`;
  }
}, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

handler.setInputAction(click => {
  const picked = viewer.scene.pick(click.position);
  if (picked && picked.id) {
    const allDams = [...window.PHASE1_DAMS, ...window.PHASE2_DAMS, ...window.PHASE3_DAMS];
    const dam = allDams.find(d => phaseEntities[currentPhase][d.id] === picked.id);
    if (dam) { flyToDam(dam); showDetail(dam); }
  }
}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

// UI 헬퍼
// ════════════════════════════════════════════════════
function toggleLeftPanel() {
  const panel = document.getElementById('leftPanel');
  const btn   = document.getElementById('togglePanel');
  panel.classList.toggle('collapsed');
  btn.classList.toggle('collapsed');
  btn.textContent = panel.classList.contains('collapsed') ? '▶' : '◀';
}

function updateStatusBar() {
  const best = currentDams.filter(d => d.priority === '최우선').length;
  const sec  = currentDams.filter(d => d.priority === '2순위').length;
  document.getElementById('statTotal').textContent = currentDams.length;
  document.getElementById('statBest').textContent  = best;
  document.getElementById('statSec').textContent   = sec;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(103.0, 18.9, 130000),

viewer.scene.globe.tileLoadProgressEvent.addEventListener(remaining => {

        const el = document.getElementById('loading');
        if (el) el.remove();
      }, 900);
    }, 600);
  }

switchPhase(3);

// ── 모바일 탭 ────────────────────────────────────
function mobSelectTab(tab) {
  const leftPanel  = document.getElementById('leftPanel');
  const rightPanel = document.getElementById('rightPanel');
  ['map','list','detail'].forEach(t => {
    const el = document.getElementById('mobTab' + t.charAt(0).toUpperCase() + t.slice(1));
    if (el) el.classList.toggle('active', t === tab);
  });
  if (tab === 'map')    { leftPanel.classList.remove('mobile-open'); rightPanel.classList.remove('open'); }
  else if (tab === 'list')   { leftPanel.classList.add('mobile-open');    rightPanel.classList.remove('open'); }
  else if (tab === 'detail') { leftPanel.classList.remove('mobile-open'); rightPanel.classList.add('open'); }
}

const _origFlyToDam = flyToDam;
flyToDam = function(dam) {
  _origFlyToDam(dam);
  if (window.innerWidth <= 768) setTimeout(() => mobSelectTab('detail'), 300);
};

if (window.innerWidth <= 768) mobSelectTab('list');
